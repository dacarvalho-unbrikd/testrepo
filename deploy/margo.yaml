apiVersion: margo.org/v1-alpha1
kind: ApplicationDescription
metadata:
  id: com-example-anomalydetector        # dashes, no periods
  name: Factory Anomaly Detector
  description: ML workload for detecting vibration anomalies.
  version: "1.2.0"                         # under metadata
  catalog:
    application:
      tagline: Prevent downtime before it happens
      tags: ["iiot", "machine-learning"]
    organization:
      - name: IndustrialEdge Corp          # array of orgs
deploymentProfiles:
  - type: compose                          # not docker-compose
    id: edge-compose                        # id required
    components:
      - name: detector-compose
        properties:
          packageLocation: registry.example.com/components/anomaly-detector:1.2.0
  - type: helm                              # not kubernetes
    id: cluster-helm
    components:
      - name: detector-helm
        properties:
          repository: registry.example.com/charts/anomaly-detector
          revision: "1.2.0"